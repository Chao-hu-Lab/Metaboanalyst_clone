name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * 0"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-regression-311:
    name: Full Regression (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 120

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run not-slow regression file-by-file
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = Get-ChildItem -Path "tests" -Filter "test_*.py" | Sort-Object Name

          foreach ($file in $files) {
              Write-Host "=== RUNNING $($file.Name) ==="
              uv run pytest $file.FullName -q -m "not slow"
              if ($LASTEXITCODE -ne 0) {
                  throw "Test file failed: $($file.Name)"
              }
          }

  test-slow-gui-311:
    name: Slow GUI Smoke (Python 3.11)
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run slow GUI smoke cases with visible progress
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $slowTargets = @(
              "tests\test_gui_layout.py::test_phase7_preset_bar_smoke_matrix",
              "tests\test_gui_layout.py::test_phase7_scroll_areas_reach_critical_controls",
              "tests\test_gui_layout.py::test_phase7_preset_apply_keeps_norm_controls_visible_after_data_mapping"
          )

          foreach ($target in $slowTargets) {
              Write-Host "=== RUNNING $target ==="
              uv run pytest $target -vv -s
              if ($LASTEXITCODE -ne 0) {
                  throw "Slow GUI smoke failed: $target"
              }
          }

  test-compat-312:
    name: Compatibility Smoke (Python 3.12)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.12"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run compatibility smoke tests
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $smokeTargets = @(
              "tests\test_config_load.py",
              "tests\test_core.py",
              "tests\test_paired_analysis.py",
              "tests\test_run_from_config_input_formats.py",
              "tests\test_sample_interface.py",
              "tests\test_plot_toolbar.py"
          )

          $files = foreach ($target in $smokeTargets) {
              if (-not (Test-Path $target)) {
                  throw "Compatibility smoke target not found: $target"
              }

              (Get-Item $target).FullName
          }

          foreach ($file in $files) {
              $name = Split-Path $file -Leaf
              Write-Host "=== RUNNING $name ==="
              uv run pytest $file -q
              if ($LASTEXITCODE -ne 0) {
                  throw "Compatibility smoke failed: $name"
              }
          }

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --select=F,E9
