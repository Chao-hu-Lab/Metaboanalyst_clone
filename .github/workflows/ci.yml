name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * 0"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-gui-shell-311:
    if: github.event_name == 'pull_request'
    name: PR GUI Shell Smoke (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 60

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run GUI shell smoke targets
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("pr-gui-shell")

  pr-stats-311:
    if: github.event_name == 'pull_request'
    name: PR Statistics Smoke (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 60

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run Step 5 and plotting smoke targets
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("pr-stats")

  pr-runtime-311:
    if: github.event_name == 'pull_request'
    name: PR Runtime and Input Smoke (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 60

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run input and runtime smoke targets
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("pr-runtime")

  test-regression-311:
    name: Full Regression (Python 3.11)
    if: always() && github.event_name == 'pull_request'
    needs:
      - pr-gui-shell-311
      - pr-stats-311
      - pr-runtime-311
    runs-on: ubuntu-latest

    steps:
      - name: Aggregate PR regression shard results
        shell: bash
        run: |
          echo "pr-gui-shell-311=${{ needs.pr-gui-shell-311.result }}"
          echo "pr-stats-311=${{ needs.pr-stats-311.result }}"
          echo "pr-runtime-311=${{ needs.pr-runtime-311.result }}"
          if [[ "${{ needs.pr-gui-shell-311.result }}" != "success" || \
                "${{ needs.pr-stats-311.result }}" != "success" || \
                "${{ needs.pr-runtime-311.result }}" != "success" ]]; then
            echo "One or more PR regression shards failed."
            exit 1
          fi

  repo-regression-core-311:
    if: github.event_name != 'pull_request'
    name: Repository Regression Core (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run core regression targets
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("repo-regression-core")

  repo-regression-gui-311:
    if: github.event_name != 'pull_request'
    name: Repository Regression GUI (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run GUI regression targets
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("repo-regression-gui")

  repo-regression-stats-311:
    if: github.event_name != 'pull_request'
    name: Repository Regression Statistics (Python 3.11)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run statistics regression targets
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("repo-regression-stats")

  test-slow-gui-311:
    name: Slow GUI Smoke (Python 3.11)
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.11"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run slow GUI smoke targets
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("slow-gui") -PytestArgs @("-vv", "-s")

  test-compat-312:
    name: Compatibility Smoke (Python 3.12)
    runs-on: [self-hosted, Windows, X64]
    timeout-minutes: 90

    steps:
      - uses: Chao-hu-Lab/shared-workflows/.github/actions/setup-python@078fc7c1cccf64884d230df8a1d84f034c9a41eb
        with:
          python-version: "3.12"
          submodules: "false"
          install-args: "-r requirements.txt pytest"

      - name: Run compatibility smoke tests
        shell: pwsh
        run: |
          .\tools\ci\run_pytest_targets.ps1 -GroupNames @("compat-312")

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --select=F,E9
