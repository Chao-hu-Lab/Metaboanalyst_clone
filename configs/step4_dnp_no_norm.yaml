# ===========================================================================
#  MetaboAnalyst Pipeline - Configuration Preset
#  Name: STEP4 DNP - No Row Normalization (Baseline)
# ===========================================================================
#
#  Description:
#    DNP 前處理後的 STEP4 資料，不做任何 row-wise 正規化。
#    此為「基線」設定，用來和其他正規化方法（PQN、SpecNorm）做對照比較。
#
#  Results (2026-02-28):
#    Features: 297 → 13 (QC-RSD 過濾後僅存 14，IQR 再移除 1)
#    PCA PC1: 34.8%, ANOVA 顯著: 8/13 (62%)
#    Volcano Exposure vs Normal: 3 sig
# ===========================================================================

# ── 輸入資料 ──────────────────────────────────────────────
# file: Excel 檔案的完整路徑
# format:
#   "sample_type_row" → 第一列 (row 0) 是 Sample_Type 標籤列（QC/Exposure/Normal/Control）
#                        第二列起才是 feature 數值
#   "plain"           → 沒有標籤列，所有 row 都是 feature 數值
#                        群組從欄位名稱自動推斷（Tumor*/Normal*/Benignfat*）
input:
  file: "C:\\Users\\user\\Desktop\\質譜數據工具箱\\ms-preprocessing-toolkit\\OUTPUT\\DNP\\STEP4_program2_DNA_alignment_20260227_220832.xlsx"
  format: "sample_type_row"

# ── 群組設定 ──────────────────────────────────────────────
# groups: 要分析的群組名稱列表（必須與 Sample_Type 或推斷結果一致）
#   - 不在此列表中的非 QC 樣本會被排除
#   - QC 樣本永遠會在 QC-RSD 過濾步驟中被移除，不需列入
# volcano_pairs: 成對比較清單（用於 volcano plot）
#   - 每對 [group1, group2] 會產生一張 volcano 圖
#   - fold change 方向: group1 相對於 group2
groups:
  include: ["Exposure", "Normal", "Control"]
  volcano_pairs:
    - ["Exposure", "Normal"]
    - ["Exposure", "Control"]
    - ["Normal", "Control"]

# ── 前處理 Pipeline ───────────────────────────────────────
# MetaboAnalyst 處理順序（不可調換）：
#   Step 0: 零值 → NaN
#   Step 1: 移除缺失值過多的 features
#   Step 2: 填補剩餘缺失值
#   Step 3a: QC-RSD 過濾（可選）
#   Step 3b: 變數過濾（低變異 features）
#   Step 4: Row-wise 正規化（樣本間校正）
#   Step 5: 資料轉換
#   Step 6: Column-wise 縮放（特徵間標準化）
pipeline:

  # Step 1: 缺失值移除閾值
  # ──────────────────────────────────────────────────────
  # missing_thresh: 0.0 ~ 1.0 之間的比例
  #   一個 feature 若有超過此比例的樣本為 NaN，則整欄移除
  #   0.50 = 50% 以上缺失就移除（較嚴格，保留數據品質好的 features）
  #   0.80 = 80% 以上才移除（較寬鬆，保留更多 features）
  #   MetaboAnalyst 預設: 0.50
  missing_thresh: 0.50

  # Step 2: 缺失值填補方法
  # ──────────────────────────────────────────────────────
  # impute_method: 用什麼值來替代 NaN
  #   "min"    → LoD (Limit of Detection) = 每欄最小正值 / 5
  #              適合質譜數據：缺失通常代表低於偵測極限，而非隨機缺失
  #   "mean"   → 欄平均值（假設缺失為隨機）
  #   "median" → 欄中位數（比 mean 更抗離群值）
  #   "knn"    → K 最近鄰填補（k=10），利用相似樣本估算
  #   "ppca"   → 機率 PCA 填補（適合多重共線性數據）
  #   "bpca"   → 貝葉斯 PCA 填補
  #   "svd"    → 迭代 SVD 填補
  #   "exclude"→ 直接移除仍有 NaN 的 features
  impute_method: "min"

  # Step 3a: QC-RSD 過濾
  # ──────────────────────────────────────────────────────
  # 原理: 利用 QC（品管）樣本的重複量測來評估每個 feature 的技術變異
  #   RSD (Relative Standard Deviation) = 標準差 / 平均值
  #   RSD 越大，代表 feature 在相同樣本中的量測不穩定
  # qc_rsd_enabled: true/false，是否啟用此過濾
  # qc_rsd_threshold: RSD 閾值
  #   0.20 = 20%（嚴格，FDA 生物分析方法驗證標準）
  #   0.25 = 25%（一般代謝組學慣例）
  #   0.30 = 30%（寬鬆）
  # 注意: 啟用後，QC 樣本會在過濾完成後自動從數據中移除
  qc_rsd_enabled: true
  qc_rsd_threshold: 0.20

  # Step 3b: 變數過濾
  # ──────────────────────────────────────────────────────
  # 移除低變異（無資訊量）的 features
  # filter_method: 用來衡量變異程度的指標
  #   "iqr"  → 四分位距（Q3 - Q1），MetaboAnalyst 預設，穩健抗離群值
  #   "sd"   → 標準差
  #   "mad"  → 中位數絕對偏差（比 IQR 更穩健）
  #   "rsd"  → 相對標準差（SD / mean）
  #   "nrsd" → 標準化 RSD（MAD / median）
  #   "None" → 不過濾
  # filter_cutoff: 移除比例閾值（0~1），低於此百分位的 features 被移除
  #   null → 自動決定:
  #     <250 features → 移除底部 5%
  #     250-499       → 移除底部 10%
  #     500-999       → 移除底部 25%
  #     >=1000        → 移除底部 40%
  filter_method: "iqr"
  filter_cutoff: null

  # Step 4: Row-wise 正規化（樣本間校正）
  # ──────────────────────────────────────────────────────
  # 目的: 消除樣本間的系統性偏差（如注入量、萃取效率差異）
  # row_norm: 正規化方法
  #   "None"         → 不做正規化
  #   "SumNorm"      → 總量正規化（每個樣本縮放至固定總強度 1000）
  #   "MedianNorm"   → 中位數正規化（每樣本除以其中位數）
  #   "SamplePQN"    → PQN 正規化（以參考樣本為基準，需提供 ref_sample）
  #   "GroupPQN"     → PQN 正規化（以參考組平均值為基準，需提供 ref_group）
  #   "CompNorm"     → 內標校正（除以指定內標 feature，需提供 ref_feature）
  #   "QuantileNorm" → 分位數正規化（強制所有樣本分布相同）
  #   "SpecNorm"     → 自訂校正因子（如 DNA 濃度、蛋白質量等，需提供 spec_norm 區段）
  row_norm: "None"

  # Step 5: 資料轉換
  # ──────────────────────────────────────────────────────
  # 目的: 讓右偏的強度分布更接近常態分布
  # transform:
  #   "None"      → 不轉換
  #   "LogNorm"   → 廣義對數 glog2（MetaboAnalyst 預設）
  #                  公式: log2((x + sqrt(x^2 + lambda^2)) / 2)
  #                  lambda = min_nonzero / 10
  #                  **注意**: 這不是 log2(x+1)，glog 對零值和負值皆有定義
  #   "Log10Norm" → 廣義 log10（同上公式，改為 base 10）
  #   "SrNorm"    → 廣義平方根
  #   "CrNorm"    → 立方根（保留正負號: sign(x) * |x|^(1/3)）
  transform: "LogNorm"

  # Step 6: Column-wise 縮放
  # ──────────────────────────────────────────────────────
  # 目的: 讓不同量級的 features 可以互相比較
  #   無縮放時，高濃度代謝物會主導 PCA 和聚類分析
  # scaling:
  #   "None"       → 不縮放
  #   "MeanCenter" → 只做中心化: x - mean
  #   "AutoNorm"   → Z-score 標準化: (x - mean) / sd
  #                  最常用，讓每個 feature 的 mean=0, sd=1
  #   "ParetoNorm" → Pareto 縮放: (x - mean) / sqrt(sd)
  #                  比 AutoNorm 保留更多原始變異結構
  #   "RangeNorm"  → 範圍縮放: (x - mean) / (max - min)
  scaling: "AutoNorm"

# ── SpecNorm 專用設定（row_norm="SpecNorm" 時才需要）─────
# spec_norm:
#   factor_column: SampleInfo 工作表中的校正因子欄位名稱
#   factor_source: 顯示在 log 中的描述文字
# spec_norm:
#   factor_column: "DNA_mg/20uL"
#   factor_source: "DNA_mg/20uL"

# ── 統計分析參數 ──────────────────────────────────────────
analysis:

  # PCA 主成分分析
  # n_components: 計算幾個主成分（上限為 min(樣本數, feature 數)）
  pca:
    n_components: 5

  # ANOVA 變異數分析（三組以上比較）
  # p_thresh:  顯著性閾值
  # nonpar:    true → 用 Kruskal-Wallis（無母數）; false → 用 one-way ANOVA（參數）
  # use_fdr:   true → BH FDR 校正; false → 不校正（容易假陽性）
  # posthoc:   true → 對顯著 features 做 Tukey HSD 事後比較
  anova:
    p_thresh: 0.05
    nonpar: false
    use_fdr: true
    posthoc: true

  # Volcano 分析（兩兩配對比較）
  # fc_thresh: Fold Change 閾值（2.0 = 2 倍變化，即 log2FC > 1）
  # p_thresh:  顯著性閾值
  # use_fdr:   true → BH FDR 校正
  volcano:
    fc_thresh: 2.0
    p_thresh: 0.05
    use_fdr: true

  # Heatmap 熱圖
  # max_features: 最多顯示幾個 features
  # top_by: 排序依據（"var" = 變異數, "mad" = 中位數絕對偏差）
  # method: 階層聚類連結方法（"ward"/"complete"/"average"/"single"）
  # metric: 距離度量（ward 強制使用 euclidean）
  # scale: 色彩縮放（"row" = 按行, "col" = 按列, "none" = 不縮放）
  heatmap:
    max_features: 50
    top_by: "var"
    method: "ward"
    metric: "euclidean"
    scale: "row"

# ── 輸出設定 ──────────────────────────────────────────────
# output_suffix: 附加到輸出資料夾名稱後面（可為空字串）
#   例: suffix="_baseline" → results/STEP4_xxx_baseline/
output:
  suffix: ""
