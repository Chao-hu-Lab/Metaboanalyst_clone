# ===========================================================================
#  MetaboAnalyst Pipeline - Configuration Preset
#  Name: DNP + PQN Normalized (SampleSpecific)
# ===========================================================================
#
#  Description:
#    已經過 PQN + SampleSpecific 正規化的 DNP 資料。
#    因為已做 row-wise 正規化，pipeline 中 row_norm 設為 None。
#    此檔案的格式與 STEP4 不同：沒有 Sample_Type 列，群組從欄名推斷。
#
#  Results (2026-02-28):
#    Features: 292 → 67 (QC-RSD 保留率 26%，遠高於 STEP4 的 5%)
#    PCA PC1: 25.8%
#    ANOVA 顯著: 48/67 (72%)
#    Volcano Tumor vs Normal: 17 sig
# ===========================================================================

input:
  file: "C:\\Users\\user\\Desktop\\質譜數據工具箱\\ms-preprocessing-toolkit\\OUTPUT\\DNP\\Normalized_PQN_SampleSpecific_20260228_050115.xlsx"
  format: "plain"               # ← 沒有 Sample_Type 列

# plain 格式的群組推斷規則:
# - 欄名含 "QC"（不分大小寫） → QC
# - 以 _RNA 或 _DNAandRNA 結尾 → 排除
# - 以 Tumor 開頭 → Tumor
# - 以 Normal 開頭 → Normal
# - 以 Benignfat 開頭 → Benignfat
groups:
  include: ["Tumor", "Normal", "Benignfat"]
  volcano_pairs:
    - ["Tumor", "Normal"]
    - ["Tumor", "Benignfat"]
    - ["Normal", "Benignfat"]

pipeline:
  missing_thresh: 0.50
  impute_method: "min"
  qc_rsd_enabled: true
  qc_rsd_threshold: 0.20
  filter_method: "iqr"
  filter_cutoff: null
  row_norm: "None"              # ← 已正規化，不再處理
  transform: "LogNorm"
  scaling: "AutoNorm"

analysis:
  pca:
    n_components: 5
  anova:
    p_thresh: 0.05
    nonpar: false
    use_fdr: true
    posthoc: true
  volcano:
    fc_thresh: 2.0
    p_thresh: 0.05
    use_fdr: true
  heatmap:
    max_features: 50
    top_by: "var"
    method: "ward"
    metric: "euclidean"
    scale: "row"

output:
  suffix: ""
