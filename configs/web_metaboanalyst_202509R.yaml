input:
  file: ""  # override via --input on CLI
  format: "sample_type_row"

groups:
  include: ["Exposure", "Normal", "Control"]
  pair_id_pattern: "BC\\d+"       # regex to extract subject ID from Sample_Name
  volcano_pairs:
    - groups: ["Exposure", "Normal"]
      paired: true                 # same subjects (Tumor vs Normal tissue)
    - groups: ["Exposure", "Control"]
      paired: false                # independent subjects
    - groups: ["Normal", "Control"]
      paired: false
  oplsda_pairs:
    - groups: ["Exposure", "Normal"]
      paired: true
    - groups: ["Exposure", "Control"]
      paired: false
    - groups: ["Normal", "Control"]
      paired: false

pipeline:
  missing_thresh: 1.0       # 1.0 = keep all features (PPT: do NOT remove NA/0 features)
  impute_method: "none"     # Skip imputation (PPT: skip Missing Value step entirely)
  qc_rsd_enabled: false     # No QC RSD filter (input is already PQN-normalized)
  filter_method: "None"     # No filtering (PPT: set 0% to preserve all signals)
  filter_cutoff: 0          # Not used when filter_method is None
  row_norm: "None"          # Already PQN-normalized upstream
  transform: "Log10Norm"    # Log10 transformation
  scaling: "ParetoNorm"     # Pareto scaling

analysis:
  pca:
    n_components: 3
  plsda:
    n_components: 2
    top_vip: 15
  anova:
    p_thresh: 0.05
    nonpar: false
    use_fdr: true
    posthoc: true
  volcano:
    fc_thresh: 2.0
    p_thresh: 0.05
    use_fdr: true
  heatmap:
    max_features: 50
    top_by: "var"
    method: "ward"
    metric: "euclidean"
    scale: "row"

output:
  suffix: ""  # optional tag appended to output folder name
