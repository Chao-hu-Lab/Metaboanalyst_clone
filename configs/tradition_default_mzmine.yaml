input:
  file: ""  # override via --input on CLI
  format: "sample_type_row"

groups:
  include: ["Exposure", "Normal", "Control"]
  pair_id_pattern: "BC\\d+"       # regex to extract subject ID from Sample_Name
  volcano_pairs:
    - groups: ["Exposure", "Normal"]
      paired: true                 # same subjects (Tumor vs Normal tissue)
    - groups: ["Exposure", "Control"]
      paired: false                # independent subjects
    - groups: ["Normal", "Control"]
      paired: false
  oplsda_pairs:
    - groups: ["Exposure", "Normal"]
      paired: true
    - groups: ["Exposure", "Control"]
      paired: false
    - groups: ["Normal", "Control"]
      paired: false

pipeline:
  missing_thresh: 1.0       # keep all features (no NA/0 removal)
  impute_method: "min"      # LoD imputation (min_positive / 5 per feature)
  qc_rsd_enabled: false
  filter_method: "None"     # no filtering
  filter_cutoff: 0
  row_norm: "SpecNorm"      # divide each sample's intensities by DNA_mg/20uL
                            # QC samples (NaN concentration) → factor=1.0 (no change)
  transform: "Log10Norm"    # glog10 transform
  scaling: "ParetoNorm"     # Pareto scaling

# ── DNA concentration normalization ──────────────────────────────────────────
# Concentrations are read from the SampleInfo sheet of the same Excel file.
# Sample names are matched by canonical key (spaces/case/underscore insensitive).
# QC samples have NaN concentration → factor defaults to 1.0 (unchanged).
spec_norm:
  factor_column: "DNA_mg/20uL"   # column in SampleInfo sheet

analysis:
  pca:
    n_components: 3
  plsda:
    n_components: 2
    top_vip: 15
  anova:
    p_thresh: 0.05
    nonpar: false
    use_fdr: true
    posthoc: true
  volcano:
    fc_thresh: 2.0
    p_thresh: 0.05
    use_fdr: true
  heatmap:
    max_features: 50
    top_by: "var"
    method: "ward"
    metric: "euclidean"
    scale: "row"

output:
  suffix: ""
